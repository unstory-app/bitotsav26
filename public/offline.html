<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitotsav Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(212, 175, 55, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.05), transparent 28%),
          #120606;
        color: #fdf5e6;
        font-family: "Lato", sans-serif;
      }

      .card {
        width: min(92vw, 560px);
        border: 1px solid rgba(212, 175, 55, 0.22);
        background: rgba(255, 255, 255, 0.05);
        padding: 32px;
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        color: #d4af37;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 14px;
        font-size: clamp(2rem, 7vw, 3.25rem);
        font-style: italic;
        line-height: 0.95;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: rgba(253, 245, 230, 0.72);
        line-height: 1.8;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Bitotsav PWA</div>
      <h1>You Are Offline</h1>
      <p>
        The Bitotsav app shell is installed, but this page needs a network connection right now.
        Reconnect and try again.
      </p>
    </div>
  </body>
</html>
